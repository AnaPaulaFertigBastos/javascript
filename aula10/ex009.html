<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nacionalidade</title>
</head>
<body>
    <h1>Verificação de nacionalidade</h1>
    País de origem: <input type="text" name="txtnac" id="txtnac">
    <input type="button" value="Verificar" onclick="verificar()">
    <div id="res"></div>
    <script>
        function verificar() {
          var nacio = document.getElementById('txtnac').value;
          var res = document.getElementById('res');
          console.log(nacio);
          res.innerHTML = `<p>Você é do país ${nacio}</p>`
          if (res == 'Brasil') {
            res.innerHTML += `<p>Você é brasileiro</p>`
          }
          else {
            res.innerHTML += `<p>Você é estrangeiro e nasceu no país ${nacio}</p>`
          }
        }
    </script>
</body>
</html>
